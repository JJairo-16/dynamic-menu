<!DOCTYPE html>
<html lang="ca">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Menu Library Docs</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef6ff',
              100: '#d9eaff',
              500: '#2563eb',
              600: '#1d4ed8',
              700: '#1e40af'
            }
          },
          boxShadow: {
            soft: '0 12px 30px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800">
  <div class="min-h-screen">
    <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/85 backdrop-blur">
      <div class="mx-auto flex max-w-7xl items-center gap-4 px-4 py-3 lg:px-6">
        <button id="menuButton"
          class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-700 shadow-sm lg:hidden"
          aria-label="Obrir menú">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <div class="min-w-0 flex-1">
          <div class="flex flex-wrap items-center gap-3">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.2em] text-brand-600">Documentació</p>
              <h1 class="truncate text-lg font-extrabold text-slate-900">Dynamic Menu Library</h1>
            </div>
            <span class="hidden rounded-full bg-brand-50 px-3 py-1 text-xs font-semibold text-brand-700 sm:inline-flex">
              web local
            </span>
          </div>
        </div>

        <label id="searchWrapper" class="relative block w-full max-w-xs">
          <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35m1.85-5.15a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </span>
          <input id="searchInput" type="search" placeholder="Cercar pàgina..."
            class="w-full rounded-2xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-4 text-sm outline-none transition focus:border-brand-500 focus:bg-white" />
        </label>
      </div>
    </header>

    <div id="layout"
      class="mx-auto grid max-w-7xl grid-cols-1 gap-6 px-4 py-6 lg:grid-cols-[300px_minmax(0,1fr)] lg:px-6">
      <aside id="sidebar"
        class="fixed inset-y-0 left-0 z-50 w-[86vw] max-w-[320px] -translate-x-full overflow-y-auto border-r border-slate-200 bg-white p-4 shadow-soft transition-transform duration-200 lg:static lg:z-0 lg:h-fit lg:self-start lg:w-auto lg:max-w-none lg:translate-x-0 lg:rounded-3xl lg:border lg:shadow-soft">
        <div class="mb-4 flex items-center justify-between lg:hidden">
          <p class="text-sm font-semibold text-slate-900">Navegació</p>
          <button id="closeMenuButton"
            class="inline-flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-700"
            aria-label="Tancar menú">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <nav id="nav" class="space-y-5"></nav>
      </aside>

      <div id="overlay" class="fixed inset-0 z-40 hidden bg-slate-900/40 lg:hidden"></div>

      <main class="min-w-0">
        <section id="contentCard" class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft sm:p-8">
          <div id="breadcrumbs" class="mb-4 text-sm text-slate-500"></div>
          <article id="content" class="max-w-none"></article>
          <div id="docNav" class="mt-10 grid gap-3 border-t border-slate-200 pt-6 sm:grid-cols-2"></div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
